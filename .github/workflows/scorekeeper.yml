name: Scorekeeper

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: scorekeeper-main
  cancel-in-progress: false

jobs:
  scorekeeper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          # The ledger push targets protected `main`. The default GITHUB_TOKEN
          # (github-actions[bot]) cannot bypass the branch ruleset on a personal
          # repo, so use SCOREKEEPER_PAT (a maintainer/admin token) when present;
          # its push bypasses as an admin. Falls back to the default token.
          token: ${{ secrets.SCOREKEEPER_PAT || github.token }}
          persist-credentials: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Record verified submission
        env:
          GH_TOKEN: ${{ secrets.SCOREKEEPER_PAT || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EVENT_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: bash scripts/ci-scorekeeper.sh
