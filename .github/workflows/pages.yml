name: Pages

on:
  # Rebuild after the authoritative ledger is updated. The publish commit is
  # tagged [skip ci], so a plain push trigger would be suppressed — chain off
  # the Scorekeeper run completing instead.
  workflow_run:
    workflows: [Scorekeeper]
    types: [completed]
  # Rebuild when the site itself or the ledger source changes directly.
  push:
    branches: [main]
    paths:
      - docs/**
      - RESULTS.md
      - history/**
      - scripts/build-leaderboard.py
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # For workflow_run, only deploy on successful Scorekeeper runs.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build leaderboard data
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/build-leaderboard.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deploy
        uses: actions/deploy-pages@v4
