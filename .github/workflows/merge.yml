# Merges verified PRs using the default GITHUB_TOKEN.
#
# Why a separate workflow_run instead of merging inside verify.yml:
# pull_request workflows from forks get a read-only GITHUB_TOKEN. workflow_run
# fires in the base-repo context after Verify PR succeeds, where the default
# token has write access — no PAT required.
name: Auto-merge

on:
  workflow_run:
    workflows: [Verify PR]
    types: [completed]
    # NOTE: no `branches:` filter. For workflow_run, that filter matches the
    # *head branch* of the triggering run, which for a PR is the feature branch,
    # not `main` — so filtering on main would skip every PR. The job `if` below
    # restricts to successful pull_request runs instead.

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  merge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Merge verified PR
        env:
          # Merge with the maintainer PAT (falling back to the default token) so
          # the resulting push to main triggers Scorekeeper. Pushes attributed to
          # GITHUB_TOKEN do NOT start new workflow runs. This step runs trusted
          # base-repo code only (never untrusted PR code), so using the PAT here
          # does not expose it to submissions.
          GH_TOKEN: ${{ secrets.SCOREKEEPER_PAT || github.token }}
          VERIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          # Resolve the open PR from the verified head commit by matching head.sha
          # across open PRs. NOTE: the obvious `commits/${SHA}/pulls` endpoint does
          # NOT work for fork PRs — the head commit lives in the contributor's fork,
          # so the base repo reports no associated PR and auto-merge silently skips
          # every third-party submission. Scanning open PRs by head SHA works for
          # both fork and same-repo PRs.
          pr="$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100" \
            --jq ".[] | select(.head.sha==\"${VERIFIED_SHA}\") | .number" 2>/dev/null \
            | head -n1 || true)"
          if [[ -z "$pr" ]]; then
            echo "No open PR for ${VERIFIED_SHA}; nothing to merge."
            exit 0
          fi

          read -r state draft head_sha <<< "$(gh pr view "$pr" \
            --repo "$GITHUB_REPOSITORY" \
            --json state,isDraft,headRefOid \
            --jq '[.state, (.isDraft|tostring), .headRefOid] | @tsv')"
          if [[ "$state" != "OPEN" ]]; then
            echo "PR #${pr} is ${state}; skip merge."
            exit 0
          fi
          if [[ "$draft" == "true" ]]; then
            echo "PR #${pr} is a draft; skip merge."
            exit 0
          fi
          if [[ "$head_sha" != "$VERIFIED_SHA" ]]; then
            echo "PR #${pr} head ${head_sha} != verified ${VERIFIED_SHA}; skip merge."
            exit 0
          fi

          echo "Merging PR #${pr} (verified at ${VERIFIED_SHA})"
          gh pr merge "$pr" --repo "$GITHUB_REPOSITORY" --squash --delete-branch
